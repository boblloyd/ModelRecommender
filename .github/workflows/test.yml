name: Tests & Coverage

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write   # post coverage comment on PRs
  checks: write          # publish test results as a check run

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Run the full test suite with coverage.
      # Exit code is non-zero if any test fails OR if coverage drops below
      # the fail_under threshold set in .coveragerc (currently 80%).
      # Subsequent steps use if: always() so reports are generated even on failure.
      - name: Run tests with coverage
        run: |
          pytest \
            --cov \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            -v

      # Write a markdown coverage table to the Actions job summary page.
      # Visible at: Actions → <run> → <job> → Summary
      - name: Write coverage summary
        if: always()
        run: python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      # Parse junit.xml and display pass/fail/skip counts as a check run
      # and as PR annotations on failing tests.
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          check_name: Test Results
          comment_title: Test Results

      # Post a coverage badge + file-by-file table as a PR comment.
      # Badge colour: green ≥ 80%, orange ≥ 70%, red below 70%.
      # On subsequent pushes to the same PR the comment is updated in place.
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

      # Upload the full HTML report as a downloadable artifact.
      # Available for 30 days under Actions → <run> → Artifacts.
      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ github.run_number }}
          path: htmlcov/
          retention-days: 30
