server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Proxy API calls to the backend service (resolved via k8s cluster DNS)
    # proxy_read_timeout is generous because LLM calls can take 20–30s
    location ~ ^/(recommend|cache|catalog|health) {
        proxy_pass         http://model-recommender-api:8765;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Serve the React SPA — all unmatched paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
