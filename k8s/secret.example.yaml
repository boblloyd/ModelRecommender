# ============================================================
# Copy this file to k8s/secret.yaml, fill in real values,
# then apply:  kubectl apply -f k8s/secret.yaml
#
# NEVER commit k8s/secret.yaml to SCM.  It is in .gitignore.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: model-recommender-secrets
  namespace: model-recommender
type: Opaque
stringData:
  # Must match POSTGRES_USER / POSTGRES_DB in the postgres deployment
  database-url: "postgresql://recommender:CHANGE_ME@postgres:5432/model_catalog"

  # POSTGRES_PASSWORD used by the postgres container
  postgres-password: "CHANGE_ME"

  # civitai.com → Account → Settings → API Keys
  civitai-api-token: "CHANGE_ME"

  # huggingface.co → Account → Access Tokens (optional for Phase 3)
  hf-token: "CHANGE_ME"

  # Ollama endpoint — host-local or remote, never committed to SCM
  # e.g. http://192.168.1.100:11434 or http://ubuntu:11434
  ollama-host: "CHANGE_ME"
