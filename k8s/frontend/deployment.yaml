apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-recommender-ui
  namespace: model-recommender
  labels:
    app: model-recommender-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-recommender-ui
  template:
    metadata:
      labels:
        app: model-recommender-ui
    spec:
      containers:
        - name: ui
          image: model-recommender-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
