# CronJob for scheduled HuggingFace incremental updates.
# Runs every 6 hours; creates an ephemeral Job pod that exits when done.
# Requires: a completed full crawl first (run hf-job.yaml).
#
# Manage:
#   kubectl get cronjobs -n model-recommender
#   kubectl get jobs -n model-recommender
#   kubectl create job --from=cronjob/hf-incremental-update manual-run -n model-recommender
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hf-incremental-update
  namespace: model-recommender
spec:
  schedule: "30 */6 * * *"           # offset 30 min from civitai-incremental-update
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: crawler
              image: model-recommender:latest
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - crawler.hf_crawler
                - --base-model
                - "Flux.1 D"
                - --mode
                - incremental
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: model-recommender-secrets
                      key: database-url
                - name: HF_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: model-recommender-secrets
                      key: hf-api-token
                      optional: true
              envFrom:
                - configMapRef:
                    name: model-recommender-config
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
