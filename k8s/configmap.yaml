apiVersion: v1
kind: ConfigMap
metadata:
  name: model-recommender-config
  namespace: model-recommender
data:
  # OLLAMA_HOST is deployment-specific and stored in the Secret, not here.
  OLLAMA_MODEL_PRIMARY: "dolphin3.0-llama3.1:8b"
  OLLAMA_MODEL_FALLBACK: "gemma3:12b"

  DEFAULT_BASE_MODEL: "Flux.1 D"
  CRAWL_PAGE_SIZE: "100"
  RATE_LIMIT_BACKOFF_START: "2"
  RATE_LIMIT_BACKOFF_MAX: "30"

  # Used by the API when dispatching Kubernetes crawler Jobs
  K8S_NAMESPACE: "model-recommender"
  CRAWLER_IMAGE: "model-recommender:latest"
